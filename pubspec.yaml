name: starpage
description: "Starpage - A creativity-based social media networking platform for talented stars to showcase their creativity and interact with other talented stars."
publish_to: 'none'

version: 1.0.0+3

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  
  # Firebase packages
  firebase_core: ^4.7.0
  firebase_auth: ^6.4.0
  cloud_firestore: ^6.3.0
  firebase_messaging: ^16.2.0

  # State management and providers
  provider: ^6.1.5+1
  
  # Image handling
  image_picker: ^1.1.2
  cached_network_image: ^3.4.1
  permission_handler: ^12.0.1
  
  # Push notifications
  flutter_local_notifications: ^22.0.0-dev.3
  package_info_plus: ^10.1.0

  # Media players
  video_player: ^2.10.2
  just_audio: ^0.10.5
  
  # Other utilities

  intl: ^0.20.2
  timeago: ^3.7.1
  path_provider: ^2.1.5
#  share_plus: ^13.1.0
  gal: ^2.3.2
  firebase_storage: ^13.3.0
  file_picker: ^12.0.0-beta.4
  wakelock_plus: ^1.5.2
  visibility_detector: ^0.4.0+2

  # File and storage

  # flutter_driver: any
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_driver:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.4

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon.png"
  min_sdk_android: 21

flutter_native_splash:
  color: "#0F1116"
  image: "assets/icon.png"
  android_12:
    image: "assets/icon.png"
    color: "#0F1116"
  fullscreen: true

flutter:
  uses-material-design: true
  assets:
    - assets/icon.png
    - assets/icon_recreated.svg
