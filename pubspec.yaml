name: starpage
description: "Starpage - A creativity-based social media networking platform for talented stars to showcase their creativity and interact with other talented stars."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  
  # Firebase packages
  firebase_core: ^4.7.0
  firebase_auth: ^6.4.0
  cloud_firestore: ^6.3.0
  firebase_messaging: ^16.2.0

  # State management and providers
  provider: ^6.1.5+1
  
  # Image handling
  image_picker: ^1.1.2
  cached_network_image: ^3.4.1
  permission_handler: ^12.0.1
  
  # Push notifications
  flutter_local_notifications: ^21.0.0
  package_info_plus: ^10.0.0

  # Media players
  video_player: ^2.10.2
  # just_audio: ^0.10.5
  
  # Other utilities

  intl: ^0.20.2
  timeago: ^3.6.1
  share_plus: ^13.0.0
  gal: ^2.2.1
  wakelock_plus: ^1.2.10

  # File and storage

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_driver:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
