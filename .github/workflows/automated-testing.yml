name: Automated Testing Suite

permissions:
  contents: read

concurrency:
  group: automated-testing-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches:
      - main
      - develop
      - 'feature/**'
  pull_request:
    branches:
      - main
      - develop
  schedule:
    - cron: '0 2 * * *'  # Daily at 2 AM UTC

env:
  FLUTTER_VERSION: '3.44.0'

jobs:
  changes:
    name: Detect Changed Paths
    runs-on: ubuntu-latest
    outputs:
      android-build: ${{ steps.filter.outputs.android-build }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Detect relevant file changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            android-build:
              - 'android/**'
              - 'lib/**'
              - 'pubspec.yaml'
              - 'pubspec.lock'
              - 'analysis_options.yaml'
              - '.github/workflows/automated-testing.yml'

  unit-tests:
    name: Unit & Widget Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Get Flutter dependencies
        run: flutter pub get

      - name: Run unit tests with coverage
        run: flutter test --coverage --verbose

      - name: Generate coverage reports
        run: |
          dart pub global activate coverage
          mkdir -p coverage
          if [ -d "coverage" ] && [ -f ".dart_tool/package_config.json" ]; then
            dart pub global run coverage:format_coverage \
              --lcov \
              --in=coverage \
              --out=coverage/lcov.info \
              --packages=.dart_tool/package_config.json \
              || true
          fi
          if [ ! -f "coverage/lcov.info" ]; then
            echo "No coverage report generated; creating empty lcov.info"
            touch coverage/lcov.info
          fi

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage/lcov.info
          flags: flutter-unit-tests
          name: codecov-flutter
          fail_ci_if_error: false
          verbose: true

      - name: Archive test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: |
            coverage/
            test/
          retention-days: 30

  code-analysis:
    name: Code Analysis & Linting
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Get Flutter dependencies
        run: flutter pub get

      - name: Run static analysis
        run: flutter analyze

      - name: Check code formatting
        run: |
          FORMAT_DIRS=()
          [ -d "lib" ] && FORMAT_DIRS+=("lib")
          [ -d "test" ] && FORMAT_DIRS+=("test")
          [ -d "integration_test" ] && FORMAT_DIRS+=("integration_test")

          if [ ${#FORMAT_DIRS[@]} -eq 0 ]; then
            echo "No format target directories found; skipping format check"
            exit 0
          fi

          dart format --set-exit-if-changed "${FORMAT_DIRS[@]}"

      - name: Run custom lints
        run: |
          dart pub global activate custom_lint
          dart pub global run custom_lint
        continue-on-error: true

      - name: Generate analysis report
        run: |
          flutter analyze --write=analysis-report.json
        continue-on-error: true

      - name: Upload analysis report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: analysis-report
          path: analysis-report.json
          if-no-files-found: ignore
          retention-days: 7

  build-test:
    name: Build Test (Debug)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: [changes]
    if: needs.changes.outputs.android-build == 'true' || github.event_name == 'schedule'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Get Flutter dependencies
        run: flutter pub get

      - name: Build APK (debug)
        run: flutter build apk --debug

      - name: Verify build artifacts
        run: |
          if [ -f "build/app/outputs/flutter-apk/app-debug.apk" ]; then
            echo "✅ APK build successful"
            ls -lh build/app/outputs/flutter-apk/app-debug.apk
          else
            echo "❌ APK build failed. Artifact not found at expected path: build/app/outputs/flutter-apk/app-debug.apk"
            echo "Current build directory contents:"
            find build -maxdepth 5 || true
            exit 1
          fi

      - name: Archive APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
          if-no-files-found: ignore
          retention-days: 7

  test-report:
    name: Test Summary & Report
    runs-on: ubuntu-latest
    if: always()
    needs: [unit-tests, code-analysis, build-test]
    permissions:
      contents: read
      issues: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Generate test summary
        run: |
          echo "# Test Execution Summary" > test-summary.md
          echo "" >> test-summary.md
          echo "**Run Date**: $(date)" >> test-summary.md
          echo "**Branch**: ${{ github.ref }}" >> test-summary.md
          echo "**Commit**: ${{ github.sha }}" >> test-summary.md
          echo "" >> test-summary.md
          echo "## Test Jobs Status" >> test-summary.md
          echo "- Unit Tests: ${{ needs.unit-tests.result }}" >> test-summary.md
          echo "- Integration Tests: See Android Emulator Tests workflow" >> test-summary.md
          echo "- Code Analysis: ${{ needs.code-analysis.result }}" >> test-summary.md
          echo "- Build Test: ${{ needs.build-test.result }}" >> test-summary.md
          cat test-summary.md

      - name: Upload test summary
        uses: actions/upload-artifact@v4
        with:
          name: test-summary
          path: test-summary.md
          retention-days: 30

      - name: Comment PR with test results
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == false
        uses: actions/github-script@v7
        continue-on-error: true
        with:
          script: |
            const fs = require('fs');
            const summary = fs.readFileSync('test-summary.md', 'utf8');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: summary
            });

  notify-failures:
    name: Notify on Test Failures
    runs-on: ubuntu-latest
    if: failure()
    needs: [unit-tests, code-analysis, build-test]
    
    steps:
      - name: Send failure notification
        run: |
          echo "⚠️ Test Pipeline Failed!"
          echo "Repository: ${{ github.repository }}"
          echo "Branch: ${{ github.ref }}"
          echo "Commit: ${{ github.sha }}"
          echo "Author: ${{ github.actor }}"
          echo "Run URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
