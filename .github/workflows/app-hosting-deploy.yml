name: Deploy to Firebase App Hosting

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          cache: true
          cache-key: ${{ runner.os }}-flutter-${{ hashFiles('**/pubspec.lock') }}
          cache-path: ${{ runner.tool_cache }}/flutter

      - name: Get dependencies
        run: |
          flutter clean
          flutter pub get

      - name: Analyze code
        run: flutter analyze --no-fatal-infos

      - name: Build Flutter web (Release)
        run: |
          flutter build web \
            --release \
            --tree-shake-icons \
            --dart-define=FLUTTER_WEB_USE_SKIA=false
        env:
          FLUTTER_BUILD_MODE: release

      - name: Set deployment channel
        id: deploy-channel
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "channel=pr-${{ github.event.number }}" >> $GITHUB_OUTPUT
          else
            echo "channel=live" >> $GITHUB_OUTPUT
          fi

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          project_id: starpage-ed409

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Preflight App Hosting checks
        run: |
          set -euo pipefail

          gcloud config set project starpage-ed409

          ACTIVE_ACCOUNT="$(gcloud auth list --filter=status:ACTIVE --format='value(account)' | head -n 1)"
          if [ -z "$ACTIVE_ACCOUNT" ]; then
            echo "::error::No active Google Cloud account found after authentication."
            exit 1
          fi

          CONFIGURED_PROJECT="$(gcloud config get-value project 2>/dev/null)"
          if [ "$CONFIGURED_PROJECT" != "starpage-ed409" ]; then
            echo "::error::gcloud project is '$CONFIGURED_PROJECT', expected 'starpage-ed409'."
            exit 1
          fi

          if ! BACKENDS_OUTPUT="$(gcloud firebase app-hosting backends list --project=starpage-ed409 --format='value(name)' 2>&1)"; then
            echo "::error::Unable to list App Hosting backends. Ensure App Hosting is enabled and FIREBASE_SERVICE_ACCOUNT has roles/apphosting.admin."
            echo "$BACKENDS_OUTPUT"
            exit 1
          fi

          echo "$BACKENDS_OUTPUT"

          if ! echo "$BACKENDS_OUTPUT" | grep -q 'flutter-stars-web'; then
            echo "::error::App Hosting backend 'flutter-stars-web' was not found in project 'starpage-ed409'."
            exit 1
          fi

      - name: Deploy to Firebase App Hosting
        run: |
          gcloud firebase app-hosting backends deploy \
            --source=. \
            --backend=flutter-stars-web \
            --project=starpage-ed409 \
            --location=us-central1
        env:
          GCLOUD_PROJECT: starpage-ed409

      - name: Comment on PR with deployment link
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `✅ Deployed to App Hosting!\n\n🔗 Preview: https://${{ steps.deploy-channel.outputs.channel }}--flutter-stars-web-starpage-ed409.web.app`
            })

      - name: Post deployment status
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const status = '${{ job.status }}' === 'success' ? '✅' : '❌';
            console.log(`${status} Deployment Status: ${{ job.status }}`);
