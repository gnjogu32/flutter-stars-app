name: Build and Distribute

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  FLUTTER_VERSION: '3.44.0'

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      apk-path: ${{ steps.build.outputs.apk-path }}
      build-number: ${{ github.run_number }}
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Run code analysis
        run: flutter analyze --android-skip-build-dependency-validation

      - name: Run tests
        run: flutter test

      - name: Build debug APK
        id: build
        run: |
          flutter build apk --debug --android-skip-build-dependency-validation
          echo "apk-path=build/app/outputs/flutter-apk/app-debug.apk" >> $GITHUB_OUTPUT

      - name: Build release APK
        if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
        run: flutter build apk --release --android-skip-build-dependency-validation

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: apk-build-${{ github.run_number }}
          path: |
            build/app/outputs/flutter-apk/app-debug.apk
            build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

  firebase-distribute:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
    
    steps:
      - uses: actions/checkout@v4

      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: apk-build-${{ github.run_number }}
          path: build/app/outputs/flutter-apk

      - name: Distribute to Firebase App Distribution
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: 1:246255479274:android:177b790682bb5b59862a93
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          file: build/app/outputs/flutter-apk/app-release.apk
          releaseNotes: |
            Build #${{ github.run_number }}
            Ref: ${{ github.ref_name }}
            Commit: ${{ github.sha }}
            Modernized build toolchain (AGP 9.2.1)
          testers: ${{ secrets.FIREBASE_TESTERS }}

  notify:
    needs: [build, firebase-distribute]
    runs-on: ubuntu-latest
    if: always()
    
    steps:
      - name: Build Status
        run: |
          echo "Build #${{ github.run_number }} completed"
          echo "Status: ${{ job.status }}"
