name: Android Integration Tests (Emulator)

on:
  push:
    branches:
      - main
      - develop
      - 'feature/**'
  pull_request:
    branches:
      - main
      - develop
  schedule:
    - cron: '0 3 * * *'  # Daily at 3 AM UTC

env:
  FLUTTER_VERSION: '3.44.0'

jobs:
  android-test:
    name: Android Integration (API ${{ matrix.api-level }})
    runs-on: ubuntu-latest
    timeout-minutes: 45
    
    strategy:
      matrix:
        api-level: [28, 31, 33]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Get Flutter dependencies
        run: flutter pub get

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
        continue-on-error: true

      - name: Run emulator tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ matrix.api-level }}
          arch: x86_64
          profile: pixel
          script: flutter test integration_test/ --verbose --android-skip-build-dependency-validation

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-test-results-api-${{ matrix.api-level }}
          path: build/
          retention-days: 30

  espresso-test:
    name: Android Espresso Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Get Flutter dependencies
        run: flutter pub get

      - name: Check if Espresso tests exist
        id: check-tests
        run: |
          if [ -d "android/app/src/androidTest" ]; then
            echo "tests_exist=true" >> $GITHUB_OUTPUT
          else
            echo "tests_exist=false" >> $GITHUB_OUTPUT
            echo "⚠️  No Espresso tests found in android/app/src/androidTest"
          fi

      - name: Run Espresso tests
        if: steps.check-tests.outputs.tests_exist == 'true'
        run: |
          cd android
          ./gradlew connectedAndroidTest --info -Pandroid.skipBuildDependencyValidation=true
        continue-on-error: true

      - name: Upload Espresso results
        if: always() && steps.check-tests.outputs.tests_exist == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: espresso-test-results
          path: android/app/build/outputs/androidTest-results/
          retention-days: 30
        continue-on-error: true
